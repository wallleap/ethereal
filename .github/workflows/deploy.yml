name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message for deployment'
        required: true
        default: 'Manual deployment'
      publish_branch:
        description: 'Branch to publish to'
        required: false
        default: 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: create env file
        run: |
          touch .env
          echo VITE_GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }} >> .env
          echo VITE_TWIKOO_ID: ${{ secrets.VITE_TWIKOO_ID }} >> .env
          echo VITE_GIST_TOKEN: ${{ secrets.VITE_GIST_TOKEN }} >> .env
          echo VITE_GIST_ID: ${{ secrets.VITE_GIST_ID }} >> .env
          echo VITE_CLARITY_ID: ${{ secrets.VITE_CLARITY_ID }} >> .env
          echo VITE_UTTERANCES_CODE: ${{ secrets.VITE_UTTERANCES_CODE }} >> .env
      
      - name: Build
        run: pnpm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: wallleap/wallleap.github.io
          publish_branch: ${{ inputs.publish_branch || 'master' }}
          user_name: wallleap
          user_email: 15579576761@163.com
          commit_message: ${{ inputs.commit_message || github.event.head_commit.message }}
          full_commit_message: ${{ inputs.commit_message || github.event.head_commit.message }}
          publish_dir: ./dist
          force_orphan: true
          allow_empty_commit: true
          cname: ${{ inputs.cname || 'myblog.wallleap.cn' }}
      - name: Get the output
        run: |
          echo "${{ steps.deploy.outputs.notify }}"
