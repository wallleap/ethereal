name: tag release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package files
        run: |
          # Create tarball in temporary directory to avoid race condition
          mkdir -p /tmp/ethereal
          cp -r . /tmp/ethereal/
          # Clean up excluded directories
          rm -rf /tmp/ethereal/.github /tmp/ethereal/dist /tmp/ethereal/.git
          # Create tarball
          tar -czvf ethereal.tar.gz -C /tmp/ethereal .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ethereal
          path: ethereal.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ethereal
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ethereal.tar.gz
